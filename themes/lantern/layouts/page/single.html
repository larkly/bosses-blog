{{ define "main" }}
<div class="wrap" style="max-width:900px;">
  <div class="about-head">
    {{ with .Params.kicker }}<div class="post-item__tag" style="color:var(--accent);margin-bottom:0.6rem;">{{ . }}</div>{{ end }}
    <h1>{{ .Title }}.</h1>
  </div>
  <div class="about-grid">
    {{ with .Params.avatar }}
      <img class="avatar" src="{{ . | relURL }}" alt="{{ $.Site.Params.author }}" />
    {{ else }}
      <div class="avatar">[ portrait ]</div>
    {{ end }}
    <div class="bio">
      {{ .Content }}
    </div>
  </div>
</div>
{{ end }}
