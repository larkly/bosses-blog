<header class="site-head">
  <div class="site-head__inner">
    <a href="{{ "/" | relURL }}" class="brand">{{ .Site.Title }}<em>.</em></a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="site-nav">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" id="site-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="is-active"{{ end }}>{{ .Name }}</a>
      {{ end }}
      {{ if .Site.Params.showRSS }}
        {{ with .OutputFormats.Get "RSS" }}<a href="{{ .RelPermalink }}" title="RSS feed">RSS</a>{{ end }}
      {{ end }}
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle light / dark">◐</button>
    </nav>
  </div>
</header>
